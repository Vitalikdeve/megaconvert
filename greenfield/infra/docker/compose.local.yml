name: megaconvert-local

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: megaconvert
      POSTGRES_PASSWORD: megaconvert
      POSTGRES_USER: megaconvert
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U megaconvert -d megaconvert"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_PASSWORD: megaconvert
      MINIO_ROOT_USER: megaconvert
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  mailpit:
    image: axllent/mailpit:v1.27.7
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  opensearch:
    image: opensearchproject/opensearch:2.19.3
    restart: unless-stopped
    environment:
      discovery.type: single-node
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data

  livekit:
    image: livekit/livekit-server:v1.8.5
    restart: unless-stopped
    command: --config /etc/livekit/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50010:50000-50010/udp"
    volumes:
      - ../livekit/livekit.yaml:/etc/livekit/livekit.yaml:ro

  coturn:
    image: coturn/coturn:4.7.0
    restart: unless-stopped
    command: -c /etc/coturn/turnserver.conf
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "49152-49162:49152-49162/udp"
    volumes:
      - ../coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro

volumes:
  minio-data:
  opensearch-data:
  postgres-data:
  redis-data:
