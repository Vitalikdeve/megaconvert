<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MegaConvert Legal Index</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(0,229,255,0.16), transparent 24%),
        linear-gradient(180deg, #07070d 0%, #050509 100%);
      color: rgba(255,255,255,0.94);
      font-family: "Segoe UI", "SF Pro Display", sans-serif;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .wrap {
      width: min(780px, 100%);
      padding: 28px;
      border-radius: 28px;
      background: rgba(16,16,26,0.72);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(24px);
      box-shadow: 0 24px 60px rgba(0,0,0,0.35);
    }
    h1 {
      margin-top: 0;
      font-size: clamp(32px, 5vw, 52px);
      letter-spacing: -0.03em;
    }
    p {
      color: rgba(255,255,255,0.64);
      margin-bottom: 22px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }
    .card {
      display: block;
      padding: 18px;
      border-radius: 18px;
      color: white;
      text-decoration: none;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .card:hover {
      border-color: rgba(0,229,255,0.4);
      box-shadow: 0 0 24px rgba(0,229,255,0.12);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Legal Documents</h1>
    <p>Generated static pages for Google Play compliance, public transparency, and startup website publishing.</p>
    <div class="grid">
      <a class="card" href="./transparency-report.html">Transparency Report</a>
    </div>
  </main>
</body>
</html>
