x-backend-env: &backend-env
  NODE_ENV: ${NODE_ENV:-production}
  HOST: 0.0.0.0
  CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
  TRUST_PROXY: ${TRUST_PROXY:-true}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-600}
  RATE_LIMIT_TIME_WINDOW: ${RATE_LIMIT_TIME_WINDOW:-1 minute}
  DATABASE_URL: postgres://${POSTGRES_USER:-messenger}:${POSTGRES_PASSWORD:-messenger}@postgres:5432/${POSTGRES_DB:-messenger}
  REDIS_URL: redis://redis:6379/0
  S3_ENDPOINT: http://object-storage:9000
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY:-messenger}
  S3_SECRET_KEY: ${S3_SECRET_KEY:-change-me-in-production}
  S3_BUCKET: ${S3_BUCKET:-messenger-media}
  S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-messenger}
      POSTGRES_USER: ${POSTGRES_USER:-messenger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-messenger}
    command:
      - postgres
      - -c
      - max_connections=${POSTGRES_MAX_CONNECTIONS:-250}
      - -c
      - shared_buffers=${POSTGRES_SHARED_BUFFERS:-256MB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - messenger_postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-messenger} -d ${POSTGRES_DB:-messenger}
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --save
      - "60"
      - "1000"
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - messenger_redis:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - backend

  object-storage:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-messenger}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-change-me-in-production}
    ports:
      - "${S3_PORT:-9000}:9000"
      - "${S3_CONSOLE_PORT:-9001}:9001"
    volumes:
      - messenger_object_storage:/data
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://127.0.0.1:9000/minio/health/live
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - backend

  object-storage-init:
    image: minio/mc:latest
    depends_on:
      object-storage:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - /config/create-bucket.sh
    environment:
      S3_ENDPOINT: http://object-storage:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-messenger}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-change-me-in-production}
      S3_BUCKET: ${S3_BUCKET:-messenger-media}
    volumes:
      - ./infra/docker/minio/create-bucket.sh:/config/create-bucket.sh:ro
      - ./infra/docker/minio/cors.json:/config/cors.json:ro
    restart: "no"
    networks:
      - backend

  api:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: runtime
    environment:
      <<: *backend-env
      SERVER_ROLE: api
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      object-storage-init:
        condition: service_completed_successfully
    ports:
      - "${API_PORT:-8080}:8080"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://127.0.0.1:8080/health
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - backend

  realtime:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: runtime
    environment:
      <<: *backend-env
      SERVER_ROLE: realtime
      PORT: 8090
    depends_on:
      redis:
        condition: service_healthy
      object-storage-init:
        condition: service_completed_successfully
    ports:
      - "${REALTIME_PORT:-8090}:8090"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://127.0.0.1:8090/health
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - backend

volumes:
  messenger_postgres:
  messenger_redis:
  messenger_object_storage:

networks:
  backend:
