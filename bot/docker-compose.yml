services:
  bot:
    build: .
    container_name: megaconvert-bot
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${INTERNAL_LINK_PORT:-8788}:${INTERNAL_LINK_PORT:-8788}"
    volumes:
      - bot_data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:' + (process.env.INTERNAL_LINK_PORT || 8788) + '/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 220m
    mem_reservation: 120m
    pids_limit: 150

volumes:
  bot_data:
