name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy-server:
    name: Deploy API/Worker on VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          missing=0
          for v in SSH_HOST SSH_USER SSH_PRIVATE_KEY; do
            if [ -z "${!v:-}" ]; then
              echo "::error::Missing required secret: $v"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Prepare SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -lf ~/.ssh/deploy_key >/dev/null

      - name: Deploy containers
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SERVER_APP_DIR: ${{ secrets.SERVER_APP_DIR }}
        run: |
          set -euo pipefail
          : "${SSH_PORT:=22}"
          CLEAN_HOST="${SSH_HOST#https://}"
          CLEAN_HOST="${CLEAN_HOST#http://}"
          CLEAN_HOST="${CLEAN_HOST%%/*}"
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=15 \
            -p "$SSH_PORT" "$SSH_USER@$CLEAN_HOST" \
            "SERVER_APP_DIR='${SERVER_APP_DIR:-}' bash -se" <<'EOF'
          set -euo pipefail

          APP_DIR="${SERVER_APP_DIR:-$HOME/megaconvert}"
          cd "$APP_DIR"

          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          docker compose up -d --build api worker caddy

          for i in {1..30}; do
            if curl -fsS --max-time 3 http://127.0.0.1:3000/health >/dev/null; then
              echo "API health check passed"
              break
            fi

            if [ "$i" -eq 30 ]; then
              echo "API health check failed"
              docker compose ps
              docker compose logs --tail=200 api worker caddy
              exit 1
            fi

            sleep 2
          done

          docker compose ps
          EOF

  deploy-frontend:
    name: Trigger Vercel Deploy
    runs-on: ubuntu-latest
    needs: deploy-server

    steps:
      - name: Trigger Vercel deploy hook
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "${VERCEL_DEPLOY_HOOK_URL:-}" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL is empty, skip frontend deploy"
            exit 0
          fi
          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"
          echo "Vercel deploy triggered"
