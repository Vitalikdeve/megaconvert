name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy-server:
    name: Deploy API/Worker on VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS host key
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy containers
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SERVER_APP_DIR: ${{ secrets.SERVER_APP_DIR }}
        run: |
          : "${SSH_PORT:=22}"
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "SERVER_APP_DIR='${SERVER_APP_DIR:-}' bash -se" <<'EOF'
          set -euo pipefail

          APP_DIR="${SERVER_APP_DIR:-$HOME/megaconvert}"
          cd "$APP_DIR"

          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          docker compose up -d --build api worker caddy

          for i in {1..30}; do
            if curl -fsS --max-time 3 http://127.0.0.1:3000/health >/dev/null; then
              echo "API health check passed"
              break
            fi

            if [ "$i" -eq 30 ]; then
              echo "API health check failed"
              docker compose ps
              docker compose logs --tail=200 api worker caddy
              exit 1
            fi

            sleep 2
          done

          docker compose ps
          EOF

  deploy-frontend:
    name: Trigger Vercel Deploy
    runs-on: ubuntu-latest
    needs: deploy-server

    steps:
      - name: Trigger Vercel deploy hook
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "${VERCEL_DEPLOY_HOOK_URL:-}" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL is empty, skip frontend deploy"
            exit 0
          fi
          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"
          echo "Vercel deploy triggered"
