name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and Push API/Worker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: vitalikdeve
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API image
        run: docker build -t ghcr.io/vitalikdeve/megaconvert-api:latest -f ./api/Dockerfile ./api

      - name: Push API image
        run: docker push ghcr.io/vitalikdeve/megaconvert-api:latest

      - name: Build worker image
        run: docker build -t ghcr.io/vitalikdeve/megaconvert-worker:latest -f ./worker/Dockerfile ./worker

      - name: Push worker image
        run: docker push ghcr.io/vitalikdeve/megaconvert-worker:latest

  deploy-server:
    name: Deploy API/Worker on VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    timeout-minutes: 20

    steps:
      - name: Deploy containers
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SERVER_APP_DIR: ${{ secrets.SERVER_APP_DIR }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          timeout: 30m
          command_timeout: 30m
          envs: GITHUB_TOKEN,SERVER_APP_DIR
          script: |
            set -euo pipefail

            APP_DIR="${SERVER_APP_DIR:-$HOME/megaconvert}"
            cd "$APP_DIR"

            unset HTTP_PROXY HTTPS_PROXY ALL_PROXY http_proxy https_proxy all_proxy
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            echo "$GITHUB_TOKEN" | docker login ghcr.io -u vitalikdeve --password-stdin
            docker compose pull api worker caddy
            docker compose up -d api worker caddy

            for i in {1..30}; do
              if curl -fsS --max-time 3 http://127.0.0.1:3000/health >/dev/null; then
                echo "API health check passed"
                break
              fi

              if [ "$i" -eq 30 ]; then
                echo "API health check failed"
                docker compose ps
                docker compose logs --tail=200 api worker caddy
                exit 1
              fi

              sleep 2
            done

            docker compose ps

  deploy-frontend:
    name: Trigger Vercel Deploy
    runs-on: ubuntu-latest
    needs: deploy-server

    steps:
      - name: Trigger Vercel deploy hook
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "${VERCEL_DEPLOY_HOOK_URL:-}" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL is empty, skip frontend deploy"
            exit 0
          fi
          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"
          echo "Vercel deploy triggered"
