services:
  caddy:
    image: caddy:alpine
    container_name: megaconvert-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    command: caddy reverse-proxy --from 35.202.253.153.nip.io --to http://megaconvert-api:3000
    depends_on:
      - api
    volumes:
      - caddy_data:/data
      - caddy_config:/config
  api:
    image: ghcr.io/vitalikdeve/megaconvert-api:latest
    container_name: megaconvert-api
    restart: unless-stopped
    env_file: ./api/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGIN=https://megaconvert-web.vercel.app,https://35.202.253.153.nip.io,http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174
      - ALLOW_ALL_HTTPS_ORIGINS=true
      - DATABASE_URL=postgresql://megaconvert:megaconvert@postgres:5432/megaconvert
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama3-8b-8192}
      - GROQ_TIMEOUT_MS=${GROQ_TIMEOUT_MS:-15000}
      - PROMO_CODES_ENABLED=1
      - ADMIN_PASSWORD=AdminMega2026!
      - ADMIN_JWT_SECRET=superconvert_admin_jwt_secret_prod_2026_change_me
      - ADMIN_COOKIE_SECURE=1
      - STORAGE_MODE=s3
      - S3_ENDPOINT=http://minio:9000
      - S3_REGION=us-east-1
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_ACCESS_KEY_ID=minioadmin
      - S3_SECRET_ACCESS_KEY=minioadmin
      - S3_BUCKET=megaconvert
    ports:
      - "3000:3000"
    depends_on:
      - redis
      - minio
      - postgres
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 25s
    mem_limit: 256m
    mem_reservation: 128m
    pids_limit: 200
  worker:
    image: ghcr.io/vitalikdeve/megaconvert-worker:latest
    restart: unless-stopped
    env_file: ./worker/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - API_BASE_URL=http://api:3000
      - STORAGE_MODE=s3
      - S3_ENDPOINT=http://minio:9000
      - S3_REGION=us-east-1
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_ACCESS_KEY_ID=minioadmin
      - S3_SECRET_ACCESS_KEY=minioadmin
      - S3_BUCKET=megaconvert
    depends_on:
      - redis
      - minio
      - api
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3021/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 25s
    mem_limit: 320m
    mem_reservation: 160m
    pids_limit: 200
  bot:
    build: ./bot
    container_name: megaconvert-bot
    restart: unless-stopped
    env_file:
      - ./bot/.env
    environment:
      - API_BASE_URL=http://api:3000
    ports:
      - "8788:8788"
    volumes:
      - bot_data:/app/data
    depends_on:
      - api
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:' + (process.env.INTERNAL_LINK_PORT || 8788) + '/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 220m
    mem_reservation: 120m
    pids_limit: 150
  livekit:
    image: livekit/livekit-server:latest
    command: --dev --bind 0.0.0.0
    restart: unless-stopped
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    mem_limit: 256m
    mem_reservation: 128m
    pids_limit: 150
  redis:
    image: redis:7
    command: >
      redis-server
      --save ""
      --appendonly no
      --maxmemory 100mb
      --maxmemory-policy noeviction
      --tcp-backlog 128
      --timeout 300
    restart: unless-stopped
    ports:
      - "6379:6379"
    mem_limit: 160m
    mem_reservation: 80m
    pids_limit: 100
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=megaconvert
      - POSTGRES_USER=megaconvert
      - POSTGRES_PASSWORD=megaconvert
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/promo_codes_v1.sql:/docker-entrypoint-initdb.d/10-promo_codes_v1.sql:ro
      - ./infra/postgres/account_identity_v1.sql:/docker-entrypoint-initdb.d/20-account_identity_v1.sql:ro
      - ./infra/postgres/promo_seed_v1.sql:/docker-entrypoint-initdb.d/30-promo_seed_v1.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U megaconvert -d megaconvert" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    mem_limit: 384m
    mem_reservation: 192m
    pids_limit: 200
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data:/data
    mem_limit: 256m
    mem_reservation: 128m
    pids_limit: 150
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/megaconvert;
      exit 0;"
    mem_limit: 64m
    mem_reservation: 32m

volumes:
  bot_data:
  caddy_data:
  caddy_config:
  postgres_data:
